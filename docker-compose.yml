version: '3.8'

services:
  backend:
    image: node:20-alpine
    container_name: isp-noc-backend
    working_dir: /app
    volumes:
      - ./backend:/app
      - backend-data:/app/data
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=isp-noc-jwt-secret-key-change-in-production-2024
      - NODE_ENV=production
      - DB_PATH=/app/data/ispnoc.db
      - CORS_ORIGIN=*
    command: sh -c "npm install && npm run init-db && npm start"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: isp-noc-frontend
    volumes:
      - ./dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
    driver: local
